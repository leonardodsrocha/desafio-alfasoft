<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Docs – Contact Management</title>

  <!-- Swagger UI CSS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />

  <style>
    /* Barra de topo personalizada */
    .topbar { display: none; }

    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #custom-header {
      background: #1b1b1b;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #custom-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: .5px;
    }

    #custom-header a {
      color: #85c1e9;
      text-decoration: none;
      font-size: 0.85rem;
      margin-left: auto;
    }

    #custom-header a:hover { text-decoration: underline; }

    #swagger-ui { max-width: 1280px; margin: 0 auto; padding: 0 16px 48px; }
  </style>
</head>
<body>

  <div id="custom-header">
    <h1>📋 Contact Management &mdash; Documentação da API</h1>
    <a href="/contacts" target="_blank">← Abrir aplicação</a>
  </div>

  <div id="swagger-ui"></div>

  <!-- Swagger UI JS (CDN) -->
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>

  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: "/api-docs/openapi.yaml",
        dom_id: "#swagger-ui",

        // Configurações de exibição
        deepLinking: true,
        displayRequestDuration: true,
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 2,
        docExpansion: "list",       // exibe as rotas colapsadas (list | full | none)
        filter: true,               // habilita barra de busca
        showExtensions: true,

        // Presets e plugins
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",

        // Persistência do token de autorização entre recarregamentos
        persistAuthorization: true,
      });
    };
  </script>
</body>
</html>
